spring.application.name=bau_food

# Database - QUAN TRỌNG: Sửa localhost thành mysql cho Docker
spring.datasource.url=jdbc:mysql://mysql:3306/bau_food?serverTimezone=Asia/Ho_Chi_Minh
# Dùng để build mt dev
#spring.datasource.url=jdbc:mysql://localhost:3306/bau_food?serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
# Tắt show-sql trong production để tránh lộ data trong log
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server
server.port=8080

# DevTools — CHỈ dùng cho môi trường dev, tắt trong production
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=2000
spring.devtools.restart.quiet-period=1000
# THÊM: Additional restart configuration
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**

# Thymeleaf & MVC
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.mvc.static-path-pattern=/**
server.servlet.session.timeout=86400
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.format.date=yyyy-MM-dd

# Security & File upload
jwt.secret=${JWT_SECRET:dev-only-change-in-production}
remember.me.key=${REMEMBER_ME_KEY:}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/

# Email (cấu hình SMTP để gửi email đặt lại mật khẩu)
# Thay your-email@gmail.com và your-app-password bằng thông tin thực tế
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Performance
spring.web.resources.cache.period=604800
spring.web.resources.cache.cachecontrol.max-age=604800
spring.web.resources.cache.cachecontrol.cache-public=true

# Timezone
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logging - THÊM để debug DevTools
logging.level.org.springframework.boot.devtools=DEBUG
logging.level.com.example.lesson3=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n