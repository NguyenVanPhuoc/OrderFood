services:
  app:
    build:
      context: .
    container_name: bau_food_app
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    volumes:
      - .:/app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bau_food
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    command: ["./gradlew", "bootRun", "--no-daemon", "--continuous"]
    networks:
      - bau_food_network

  mysql:
    image: mysql:8.0
    container_name: bau_food_mysql
    environment:
      MYSQL_DATABASE: bau_food
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - bau_food_network

  # Chạy unit test - dùng H2 in-memory, KHÔNG cần MySQL
  test:
    build:
      context: .
    volumes:
      - .:/app
    command: ["./gradlew", "test", "--no-daemon"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    profiles:
      - test

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bau_food_phpmyadmin
    ports:
      - "8765:80"
    environment:
      PMA_HOST: bau_food_mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - bau_food_network

volumes:
  dbdata:

networks:
  bau_food_network:
    driver: bridge